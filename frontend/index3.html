<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game Twin</title>
        <!-- Link to your CSS file -->
        <link rel="stylesheet" href="style3.css">
    </head>
    <body>
        <div class="hero">
            <div class="wrapper">
                <nav>
                    <h1 class="title-text">Choose Your Sorting Algorithm:</h1>
                </nav>
                <div class="option-container">
                    <label class="option">
                        <input type="radio" name="algorithm" value="quick-sort">
                        <span class="circle"></span>
                        Quick Sort
                    </label>
                    <label class="option">
                        <input type="radio" name="algorithm" value="cocktail-sort">
                        <span class="circle"></span>
                        Cocktail Sort
                    </label>
                </div>
                <nav>
                    <h1 class="title-text2">Refine Your Search Criteria</h1>
                </nav>
                <div class="option2-container">
                    <label class="option2 always-selected">
                        <input type="checkbox" name="search-criteria" value="metacritic-rating" checked disabled>
                        <span class="circle"></span>
                        Metacritic Rating
                    </label>
                    <label class="option2">
                        <input type="checkbox" name="search-criteria" value="achievement-number">
                        <span class="circle"></span>
                        Achievement Number
                    </label>
                    <label class="option2">
                        <input type="checkbox" name="search-criteria" value="publisher">
                        <span class="circle"></span>
                        Publisher
                    </label>
                </div>
                <div class="input-box">
                    <nav2>
                        <a class="btn">Find Twin</a>
                    </nav2>
                </div>
            </div>
    </div>
    </body>
</html>
